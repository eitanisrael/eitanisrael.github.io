<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>איתן שמעוני — קישורים</title>
    <meta name="description" content="הקישורים לפרויקטים, לכלים ולערוצים של איתן שמעוני — במקום אחד." />

    <!-- שיתוף / תצוגה מקדימה -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="איתן שמעוני — קישורים" />
    <meta property="og:description" content="הקישורים שלי במקום אחד." />

    <meta name="theme-color" content="#0e0f13" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="קישורים" />

    <!-- החלת ערכת הנושא השמורה לפני הציור (מונע הבהוב) -->
    <script>
      try {
        var t = localStorage.getItem("linkhub:theme");
        if (t === "light" || t === "dark")
          document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>

    <!-- טעינה מוקדמת של המשקלים הנפוצים לעברית -->
    <link rel="preload" as="font" type="font/woff2" href="./assets/fonts/assistant-hebrew-400.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="./assets/fonts/assistant-hebrew-600.woff2" crossorigin />

    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <button
      class="theme-toggle"
      type="button"
      data-theme-toggle
      aria-label="החלפת מצב תצוגה בהיר/כהה"
      title="בהיר / כהה"
    >
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" />
      </svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
      </svg>
    </button>

    <main class="page">
      <header class="profile" id="profile" hidden>
        <img class="profile__avatar" id="avatar" alt="" width="76" height="76" />
        <div>
          <h1 class="profile__name" id="name"></h1>
          <p class="profile__tagline" id="tagline"></p>
        </div>
      </header>

      <div class="links" id="links" aria-live="polite">
        <!-- שלד טעינה -->
        <div class="section__list">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </div>

      <footer class="foot" id="foot" hidden></footer>
    </main>

    <script src="./assets/js/config.js"></script>
    <script src="./assets/js/theme.js"></script>
    <script src="./assets/js/store.js"></script>
    <script src="./assets/js/public.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./sw.js").catch(function () {});
        });
      }
    </script>
  </body>
</html>
