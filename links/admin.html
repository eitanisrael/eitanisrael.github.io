<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ניהול קישורים</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#0e0f13" />
    <link rel="manifest" href="./admin.webmanifest" />
    <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icons/admin-apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ניהול" />

    <script>
      try {
        var t = localStorage.getItem("linkhub:theme");
        if (t === "light" || t === "dark")
          document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>

    <link rel="preload" as="font" type="font/woff2" href="./assets/fonts/assistant-hebrew-400.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="./assets/fonts/assistant-hebrew-600.woff2" crossorigin />

    <link rel="stylesheet" href="./assets/css/styles.css" />
    <link rel="stylesheet" href="./assets/css/admin.css" />
  </head>
  <body class="admin-body">
    <!-- ============ מסך נעילה ============ -->
    <section class="lock" id="lock" hidden>
      <div class="lock__card">
        <img class="lock__mark" src="./assets/icons/admin-icon-192.png" alt="" width="52" height="52" />
        <h1 class="lock__title">ניהול קישורים</h1>
        <p class="lock__sub" id="lockSub">
          הדביקו את ה־Access Token כדי להיכנס. הטוקן נשמר רק בדפדפן הזה.
        </p>
        <form id="lockForm">
          <label class="field">
            <span class="field__label">GitHub Personal Access Token</span>
            <input
              class="input"
              id="tokenInput"
              type="password"
              dir="ltr"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              placeholder="github_pat_..."
            />
          </label>
          <label class="switch" style="margin: -4px 0 14px">
            <input type="checkbox" id="tokenReveal" />
            <span class="switch__track"></span>
            <span>הצג את הטוקן</span>
          </label>
          <button class="btn btn--primary" type="submit" id="lockBtn" style="width: 100%; justify-content: center">
            כניסה
          </button>
        </form>
        <p class="lock__hint" id="lockHint">
          אין לך טוקן? צור אחד
          <a id="tokenLink" href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener">כאן</a>
          — הרשאת <b>Contents: Read and write</b> ל־repo הזה בלבד. ההסבר המלא ב־README.
        </p>
      </div>
    </section>

    <!-- ============ אפליקציית העורך ============ -->
    <div id="app" hidden>
      <header class="bar">
        <div class="bar__brand">
          <img src="./assets/icons/favicon.svg" alt="" width="28" height="28" />
          <span>ניהול קישורים</span>
        </div>
        <div class="bar__spacer"></div>
        <span class="bar__status" id="status"></span>
        <a class="icon-btn" href="./" target="_blank" rel="noopener" title="צפייה באתר" aria-label="צפייה באתר">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3h7v7"/><path d="M21 3l-9 9"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg>
        </a>
        <button class="icon-btn" type="button" data-theme-toggle title="בהיר / כהה" aria-label="החלפת מצב תצוגה">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
        <button class="btn btn--ghost btn--sm" type="button" id="lockNow" title="שכח טוקן ונעל">נעילה</button>
        <button class="btn btn--primary btn--sm" type="button" id="saveBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
          שמירה
        </button>
      </header>

      <div class="errbar" id="errbar" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 8v5M12 16.5v.01"/></svg>
        <div class="errbar__body">
          <strong id="errTitle"></strong>
          <span id="errFix"></span>
          <details id="errDetails">
            <summary>פרטים טכניים</summary>
            <code id="errRaw"></code>
          </details>
        </div>
        <button class="btn btn--sm" type="button" id="errRetry">נסה לשמור שוב</button>
        <button class="icon-btn" type="button" id="errClose" aria-label="סגירה">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <main class="wrap">
        <div class="editor-col">
          <section class="panel">
            <div class="panel__head"><span class="panel__title">פרופיל</span></div>
            <label class="field">
              <span class="field__label">שם</span>
              <input class="input" id="pName" placeholder="השם שיוצג בראש העמוד" />
            </label>
            <label class="field">
              <span class="field__label">תיאור קצר</span>
              <input class="input" id="pTagline" placeholder="שורת תיאור מתחת לשם (לא חובה)" />
            </label>
            <label class="field">
              <span class="field__label">כתובת תמונת פרופיל</span>
              <input class="input" id="pAvatar" dir="ltr" placeholder="./assets/icons/avatar.svg" />
            </label>
          </section>

          <section class="panel">
            <div class="panel__head">
              <span class="panel__title">קישורים</span>
              <div class="bar__spacer"></div>
              <button class="btn btn--ghost btn--sm" type="button" id="addSection">+ קבוצה</button>
            </div>
            <div id="sections"></div>
          </section>
        </div>

        <div class="preview-col">
          <section class="panel">
            <div class="panel__head"><span class="panel__title">תצוגה מקדימה</span></div>
            <div class="preview">
              <header class="profile" id="pvProfile">
                <img class="profile__avatar" id="pvAvatar" alt="" width="76" height="76" />
                <div>
                  <h2 class="profile__name" id="pvName"></h2>
                  <p class="profile__tagline" id="pvTagline"></p>
                </div>
              </header>
              <div class="links" id="pvLinks"></div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <!-- ============ תבניות ============ -->
    <template id="tpl-section">
      <div class="section-ed" data-section>
        <div class="section-ed__head">
          <input class="input" data-f="stitle" placeholder="כותרת קבוצה (לא חובה)" />
          <button class="icon-btn" type="button" data-act="sup" title="הזז קבוצה מעלה" aria-label="הזז קבוצה מעלה">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
          </button>
          <button class="icon-btn" type="button" data-act="sdown" title="הזז קבוצה מטה" aria-label="הזז קבוצה מטה">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <button class="btn btn--danger btn--sm" type="button" data-act="sdel">מחיקה</button>
        </div>
        <div class="section-ed__items" data-items></div>
        <button class="btn btn--ghost btn--sm" type="button" data-act="add-item">+ הוסף קישור</button>
      </div>
    </template>

    <template id="tpl-item">
      <div class="item-ed" draggable="true" data-item>
        <div class="item-ed__top">
          <span class="item-ed__handle" data-handle title="גרור לשינוי סדר" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>
          </span>
          <input class="input item-ed__title" data-f="title" placeholder="שם הקישור" />
          <div class="item-ed__actions">
            <button class="icon-btn" type="button" data-act="up" title="הזז מעלה" aria-label="הזז מעלה">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
            </button>
            <button class="icon-btn" type="button" data-act="down" title="הזז מטה" aria-label="הזז מטה">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <button class="icon-btn" type="button" data-act="del" title="מחיקה" aria-label="מחיקה">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            </button>
          </div>
        </div>
        <input class="input" data-f="url" dir="ltr" placeholder="https://..." />
        <div class="item-ed__meta">
          <input class="input" data-f="description" placeholder="תיאור קצר (לא חובה)" style="flex: 1 1 150px" />
          <input class="input" data-f="icon" placeholder="🙂" maxlength="2" title="אמוג׳י (לא חובה)" style="flex: 0 0 68px; text-align: center" />
          <label class="switch">
            <input type="checkbox" data-f="hidden" />
            <span class="switch__track"></span>
            <span>מוסתר</span>
          </label>
        </div>
      </div>
    </template>

    <script src="./assets/js/config.js"></script>
    <script src="./assets/js/theme.js"></script>
    <script src="./assets/js/store.js"></script>
    <script src="./assets/js/admin.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./sw.js").catch(function () {});
        });
      }
    </script>
  </body>
</html>
